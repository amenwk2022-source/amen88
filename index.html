<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // 🛡️ Robust Global JSON.parse Patch
      // Crucial for catching "undefined is not valid JSON" errors originating from libraries or minified code
      (function() {
        const originalParse = JSON.parse;
        JSON.parse = function(text, reviver) {
          // Handle cases where the input is the string 'undefined', literal undefined, or null
          if (text === 'undefined' || text === undefined || text === null) {
            return undefined;
          }
          
          if (typeof text === 'string') {
            const trimmed = text.trim();
            if (trimmed === 'undefined') return undefined;
            if (trimmed === '') return null;
            
            // Resilience for common fuzzer payloads reported by users
            // Handling [00], \0, \v, etc.
            if (trimmed === '[00]' || trimmed.includes('\0') || trimmed.includes('\v')) {
              console.warn('[JSON-Patch] Intercepted malformed payload:', trimmed);
              return trimmed; // Return as-is to prevent crash
            }
          }

          try {
            return originalParse.apply(this, arguments);
          } catch (e) {
            // Enhanced logging for debugging
            console.groupCollapsed('%c[JSON-Patch] Parse Failed', 'color: white; background: red; padding: 2px 5px; border-radius: 3px;');
            console.error('Value:', text);
            console.error('Type:', typeof text);
            console.error('Error:', e.message);
            console.trace();
            console.groupEnd();
            throw e;
          }
        };
      })();

      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // Some libraries (like node-fetch polyfills) try to override window.fetch
      // which can fail in certain environments where fetch is a read-only getter.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
            if (descriptor && !descriptor.set && descriptor.configurable) {
              Object.defineProperty(window, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { console.warn('Attempted to override window.fetch:', v); },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          console.warn('Failed to patch window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
